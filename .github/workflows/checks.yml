# CI checks sdíleného frameworku: stejné gates, jaké běží lokálně
# (`bun run check` = Launchpad discovery check + testy; Guide build).
# Release/binárková pipeline je samostatná práce (CAC-0054, task-2026-07-16-002).
name: checks

on:
  pull_request:
  push:
    branches: [main]

# Superseded běhy rušíme jen u PR (šetří runnery při rychlém přepushování).
# U PR seskupujeme podle čísla PR, takže se ruší jen starší běhy téhož PR;
# číslo PR je unikátní i mezi fork PR se stejným názvem větve (public repo).
# Push do main nemá pull_request.number → fallback na unikátní run_id, takže
# každý commit na sdíleném main dostane vlastní skupinu, nikdy se nekoalescuje
# ani neruší a zůstane po něm dokončený CI záznam.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

# Public repo: CI token drží least-privilege — joby jen čtou obsah.
permissions:
  contents: read

# Akce pinujeme na immutable commit SHA (supply-chain hardening na public repu:
# přesunutý tag ani kompromitovaný upstream účet nespustí cizí kód v CI).
# Komentář za SHA drží lidsky čitelnou verzi pro budoucí bumpy.
jobs:
  checks:
    name: bun run check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          # Držet v paritě s vývojovými mašinami; při bumpu ověřit i macOS
          # codesign regresi (Bun >= 1.3.12) v budoucí release pipeline.
          bun-version: 1.3.14
      - name: Launchpad discovery check + testy
        run: bun run check

  guide-build:
    name: guide app build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Instalace závislostí Guide
        working-directory: guide/app/v1
        run: bun install --frozen-lockfile
      - name: Build Guide
        working-directory: guide/app/v1
        run: bun run build
